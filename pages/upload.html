<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviste | Sube tu prenda ♻️</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rouchant.github.io/Reviste/pages/upload.html">
    <meta property="og:title" content="Reviste | Sube tu prenda ♻️">
    <meta property="og:description" content="¿Tienes ropa que ya no usas? Dale una segunda vida en REVISTE. Sube tu prenda y únete a la moda circular.">
    <meta property="og:image" content="https://rouchant.github.io/Reviste/assets/images/og_image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://rouchant.github.io/Reviste/pages/upload.html">
    <meta property="twitter:title" content="Reviste | Sube tu prenda ♻️">
    <meta property="twitter:description" content="¿Tienes ropa que ya no usas? Dale una segunda vida en REVISTE. Sube tu prenda y únete a la moda circular.">
    <meta property="twitter:image" content="https://rouchant.github.io/Reviste/assets/images/og_image.png">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="icon" type="image/png" href="../assets/images/ui/logo.png">
</head>
<body class="auth-layout-body">
    <div class="container pb-5">
        <div class="text-center mb-5">
            <a href="../index.html">
                <img src="../assets/images/ui/logo-h.png" alt="REVISTE" style="height: 60px;">
            </a>
        </div>

        <div class="upload-card">
            <h1 class="h3 brand-font mb-4 text-center">Darle una segunda vida a tu ropa 🌿</h1>
            <p class="text-muted text-center mb-5">Sube los detalles de tu prenda y únete a la moda circular.</p>

            <form id="uploadForm">
                <!-- Image Upload -->
                <div class="mb-5">
                    <label class="form-label-custom">Foto de la prenda</label>
                    <div class="image-upload-box" onclick="document.getElementById('fileInput').click()">
                        <div class="upload-placeholder" id="placeholder">
                            <i data-lucide="camera"></i>
                            <p class="mb-0 fw-600 text-muted">Añadir foto principal</p>
                            <span class="small text-muted">Luz natural recomendada</span>
                        </div>
                        <img id="imgPreview" class="image-preview">
                        <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(this)">
                    </div>
                </div>

                <!-- Basic Info -->
                <div class="mb-4">
                    <label class="form-label-custom">Título de la publicación</label>
                    <input type="text" class="form-control-custom" placeholder="Ej: Chaqueta Denim Vintage 90s" required>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label-custom">Categoría</label>
                        <select class="form-control-custom" required>
                            <option value="">Seleccionar...</option>
                            <option value="1">Vintage 90s</option>
                            <option value="2">Y2K Style</option>
                            <option value="3">Denim</option>
                            <option value="4">Streetwear</option>
                            <option value="5">Accesorios</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Talla</label>
                        <select class="form-control-custom" required>
                            <option value="">Seleccionar...</option>
                            <option value="XS">XS</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="UNICA">Talla Única</option>
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label-custom">Precio de venta</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;">$</span>
                            <input type="number" class="form-control-custom border-start-0" style="border-radius: 0 12px 12px 0;" placeholder="0" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">Estado de conservación</label>
                        <select class="form-control-custom" required>
                            <option value="">Seleccionar...</option>
                            <option value="nuevo">Nuevo con etiqueta</option>
                            <option value="como_nuevo">Como nuevo</option>
                            <option value="bueno">Buen estado</option>
                        </select>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label-custom">Detalles de la prenda</label>
                    <textarea class="form-control-custom" rows="4" placeholder="Cuéntanos más sobre el material, calce, desperfectos, etc." required></textarea>
                </div>

                <div class="p-4 bg-light rounded-4 mb-5 small">
                    <div class="d-flex gap-3 align-items-center">
                        <i data-lucide="info" class="text-pink"></i>
                        <p class="mb-0 text-muted">Tu publicación será revisada por nuestro equipo de curatoria. Te avisaremos cuando esté publicada.</p>
                    </div>
                </div>

                <button type="submit" class="btn-publish">Publicar prenda</button>
                <div class="text-center mt-4">
                    <a href="../index.html" class="text-decoration-none text-muted small">Cancelar y volver</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function previewImage(input) {
            const preview = document.getElementById('imgPreview');
            const placeholder = document.getElementById('placeholder');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('uploadForm').onsubmit = (e) => {
            e.preventDefault();
            alert('¡Genial! Tu prenda ha sido enviada a revisión.');
            window.location.href = '../index.html';
        };
    </script>
</body>
</html>
