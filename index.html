<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVISTE | Marketplace de Moda Circular</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="index.html">
                <img src="assets/logo.png" alt="REVISTE Logo">
            </a>
            <div class="d-flex gap-3 align-items-center">
                <a href="admin.html" class="text-dark d-none d-md-block" style="text-decoration: none; font-weight: 500;">Panel Admin</a>
                <i data-lucide="shopping-bag" class="text-dark"></i>
                <i data-lucide="user" class="text-dark"></i>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mt-4 pb-5">
        
        <!-- Search -->
        <div class="mb-4">
            <div class="position-relative">
                <input type="text" class="search-bar" placeholder="Buscar prendas únicas, Y2K, vintage...">
                <i data-lucide="search" class="position-absolute" style="top: 50%; right: 20px; transform: translateY(-50%); color: #636E72; width: 20px;"></i>
            </div>
        </div>

        <!-- Categories -->
        <section class="mb-4">
            <h2 class="h5 mb-3 brand-font">Explorar por Estilo</h2>
            <div class="category-scroll">
                <a href="#" class="category-pill active">Todos</a>
                <a href="#" class="category-pill">Vintage 90s</a>
                <a href="#" class="category-pill">Estilo Y2K</a>
                <a href="#" class="category-pill">Denim</a>
                <a href="#" class="category-pill">Streetwear</a>
                <a href="#" class="category-pill">Accesorios</a>
            </div>
        </section>

        <!-- Product Feed -->
        <section>
            <div class="d-flex justify-content-between align-items-end mb-4">
                <h2 class="h4 mb-0 brand-font">Recién llegados</h2>
                <a href="#" class="text-decoration-none" style="color: var(--brand-pink); font-weight: 600; font-size: 0.9rem;">Ver todo</a>
            </div>

            <div class="row g-3">
                <!-- Item 1 -->
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="product-card">
                        <div class="product-image-container">
                            <span class="product-tag">Y2K</span>
                            <img src="assets/item1.png" alt="Chaqueta Denim" class="product-image">
                        </div>
                        <div class="product-info">
                            <h3 class="h6 mb-1 text-truncate">Chaqueta Denim Vintage</h3>
                            <p class="product-price mb-0">$25.990</p>
                        </div>
                    </div>
                </div>

                <!-- Item 2 -->
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="product-card">
                        <div class="product-image-container">
                            <span class="product-tag">90s</span>
                            <img src="assets/item2.png" alt="Suéter Retro" class="product-image">
                        </div>
                        <div class="product-info">
                            <h3 class="h6 mb-1 text-truncate">Suéter Retro Color Block</h3>
                            <p class="product-price mb-0">$18.500</p>
                        </div>
                    </div>
                </div>

                <!-- Item 3 -->
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="product-card">
                        <div class="product-image-container">
                            <span class="product-tag">Cargo</span>
                            <img src="assets/item3.png" alt="Pantalones Cargo" class="product-image">
                        </div>
                        <div class="product-info">
                            <h3 class="h6 mb-1 text-truncate">Pantalones Cargo Earthy</h3>
                            <p class="product-price mb-0">$22.000</p>
                        </div>
                    </div>
                </div>

                <!-- Placeholder card to show grid -->
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="product-card">
                        <div class="product-image-container">
                            <span class="product-tag">Nuevo</span>
                            <div class="d-flex align-items-center justify-content-center h-100" style="background: #f8f9fa;">
                                <i data-lucide="image" style="width: 40px; height: 40px; color: #dee2e6;"></i>
                            </div>
                        </div>
                        <div class="product-info">
                            <h3 class="h6 mb-1 text-truncate">Vestido Grunge Flora</h3>
                            <p class="product-price mb-0">$15.000</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Floating Action Button -->
    <a href="#" class="fab-upload" title="Subir Prenda">
        <i data-lucide="plus"></i>
    </a>

    <!-- Footer Mobile Nav -->
    <nav class="navbar fixed-bottom d-md-none border-top bg-white">
        <div class="container d-flex justify-content-around py-2">
            <a href="index.html" class="text-pink"><i data-lucide="home"></i></a>
            <a href="#" class="text-dark"><i data-lucide="search"></i></a>
            <a href="#" class="text-dark"><i data-lucide="heart"></i></a>
            <a href="#" class="text-dark"><i data-lucide="message-circle"></i></a>
            <a href="admin.html" class="text-dark"><i data-lucide="settings"></i></a>
        </div>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
